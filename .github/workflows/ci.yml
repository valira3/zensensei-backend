name: ZenSensei CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: gcr.io

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install linting tools
        run: pip install ruff black isort
      - name: Run Ruff
        run: ruff check services/
      - name: Check Black formatting
        run: black --check services/
      - name: Check isort
        run: isort --check-only services/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      neo4j:
        image: neo4j:5.18
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install shared dependencies
        run: pip install -r services/shared/requirements.txt
      - name: Run all service tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ENVIRONMENT: test
        run: |
          for service in user_service graph_query_service ai_reasoning_service integration_service notification_service analytics_service api_gateway; do
            if [ -f services/$service/requirements.txt ]; then
              pip install -r services/$service/requirements.txt
            fi
            if [ -d services/$service/tests ]; then
              python -m pytest services/$service/tests/ -v --tb=short
            fi
          done
