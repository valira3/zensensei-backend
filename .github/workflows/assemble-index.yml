name: Assemble index.html
on:
  push:
    paths:
      - 'frontend/public/html_chunk_aa'
jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Assemble index.html from chunks
        run: |
          cat frontend/public/html_chunk_aa \
              frontend/public/html_chunk_ab \
              frontend/public/html_chunk_ac \
              frontend/public/html_chunk_ad > frontend/public/index.html
          
          # Verify it assembled correctly
          wc -c frontend/public/index.html
          
          # Remove chunk files
          rm -f frontend/public/html_chunk_aa
          rm -f frontend/public/html_chunk_ab
          rm -f frontend/public/html_chunk_ac
          rm -f frontend/public/html_chunk_ad
          
          # Commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/index.html
          git rm frontend/public/html_chunk_aa frontend/public/html_chunk_ab frontend/public/html_chunk_ac frontend/public/html_chunk_ad
          git commit -m "Complete frontend: auth, settings, accessibility, error states, ToS/Privacy"
          git push
      - name: Delete this workflow
        run: |
          git rm .github/workflows/assemble-index.yml || true
          git commit -m "Remove assembly workflow" || true
          git push || true
