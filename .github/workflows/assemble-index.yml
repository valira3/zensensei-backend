name: Assemble index.html

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check chunks exist
        id: check
        run: |
          if [ -f frontend/public/html_chunk_aa ] && [ -f frontend/public/html_chunk_ab ] && [ -f frontend/public/html_chunk_ac ] && [ -f frontend/public/html_chunk_ad ]; then
            echo "chunks_exist=true" >> $GITHUB_OUTPUT
          else
            echo "chunks_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Assemble index.html
        if: steps.check.outputs.chunks_exist == 'true'
        run: |
          cat frontend/public/html_chunk_aa \
              frontend/public/html_chunk_ab \
              frontend/public/html_chunk_ac \
              frontend/public/html_chunk_ad > frontend/public/index.html
          echo "Assembled. Size: $(wc -c < frontend/public/index.html) bytes"

      - name: Remove chunks and self-delete workflow
        if: steps.check.outputs.chunks_exist == 'true'
        run: |
          git rm frontend/public/html_chunk_aa
          git rm frontend/public/html_chunk_ab
          git rm frontend/public/html_chunk_ac
          git rm frontend/public/html_chunk_ad
          git rm .github/workflows/assemble-index.yml

      - name: Commit assembled file
        if: steps.check.outputs.chunks_exist == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/index.html
          git commit -m "Complete frontend: auth, settings, accessibility, error states, ToS/Privacy"
          git push
