<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenSensei — Integrations Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* ─── CSS Variables ──────────────────────────────────────────────────────── */
    :root {
      --bg-primary: #f8f9fc;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1a1f36;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --border: #e5e7eb;
      --border-light: #f3f4f6;
      --accent: #6366f1;
      --accent-light: #ede9fe;
      --accent-hover: #4f46e5;
      --success: #10b981;
      --success-light: #d1fae5;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --error: #ef4444;
      --error-light: #fee2e2;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --transition: 200ms ease;
      --transition-interactive: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    [data-theme="dark"] {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1f2e;
      --bg-card: #1e2436;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #2d3748;
      --border-light: #1e2d3d;
      --accent: #818cf8;
      --accent-light: #1e1b4b;
      --accent-hover: #6366f1;
      --success: #34d399;
      --success-light: #064e3b;
      --warning: #fbbf24;
      --warning-light: #451a03;
      --error: #f87171;
      --error-light: #450a0a;
    }

    /* ─── Layout ──────────────────────────────────────────────────────────────────────── */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 0;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 16px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .sidebar-logo .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }
    .nav-section { padding: 4px 8px; }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 8px 8px 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      text-decoration: none;
    }
    .nav-item:hover { background: var(--bg-primary); color: var(--text-primary); }
    .nav-item.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }
    .nav-item i { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-bar {
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .page-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .top-bar-right { display: flex; align-items: center; gap: 8px; }
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ─── Buttons ──────────────────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all var(--transition-interactive);
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border-light); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon {
      width: 32px;
      height: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
    }

    /* ─── Search ──────────────────────────────────────────────────────────────────────── */
    .search-bar {
      position: relative;
      width: 260px;
    }
    .search-bar i {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
    }
    .search-bar input {
      width: 100%;
      padding: 7px 10px 7px 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition);
    }
    .search-bar input:focus { border-color: var(--accent); }

    /* ─── Stats bar ────────────────────────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      flex: 1;
      min-width: 0;
    }
    .stat-card .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .stat-card .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .stat-card .stat-sub {
      font-size: 12px;
      color: var(--success);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ─── Filter tabs ──────────────────────────────────────────────────────────────────── */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-tab {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      transition: all var(--transition-interactive);
    }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ─── Integration Grid ──────────────────────────────────────────────────────────────── */
    .integrations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .integration-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      cursor: pointer;
      transition: all var(--transition-interactive),
                  transform var(--transition-interactive);
      position: relative;
    }
    .integration-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .integration-card.connected {
      border-color: var(--success);
      background: var(--bg-secondary);
    }
    .integration-card.connected::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--success);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .service-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .connection-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      letter-spacing: 0.04em;
    }
    .badge-connected {
      background: var(--success-light);
      color: var(--success);
    }
    .badge-disconnected {
      background: var(--bg-primary);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .badge-error {
      background: var(--error-light);
      color: var(--error);
    }
    .badge-coming-soon {
      background: var(--warning-light);
      color: var(--warning);
    }
    .service-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 3px;
    }
    .service-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .service-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }
    .service-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--bg-primary);
      color: var(--text-muted);
      border: 1px solid var(--border-light);
    }
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .last-sync {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ─── Power Flow (category label) ─────────────────────────────────────────────── */
    .power-flow {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .pf-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background-size: cover;
      flex-shrink: 0;
    }
    .pf-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .powers-label {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ─── Detail Panel ─────────────────────────────────────────────────────────────────── */
    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 400px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      z-index: 200;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-lg);
    }
    .detail-panel.open { transform: translateX(0); }
    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header-left { display: flex; align-items: center; gap: 10px; }
    .panel-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .panel-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .panel-subtitle { font-size: 12px; color: var(--text-secondary); }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px; }
    .panel-section { margin-bottom: 20px; }
    .panel-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .panel-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .panel-footer .btn { flex: 1; justify-content: center; }
    .scope-list { display: flex; flex-direction: column; gap: 6px; }
    .scope-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .scope-item i { color: var(--success); font-size: 12px; }
    .permission-note {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      line-height: 1.5;
    }

    /* ─── Connected service info ───────────────────────────────────────────────────── */
    .connected-info {
      background: var(--success-light);
      border: 1px solid var(--success);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .connected-info i { color: var(--success); }
    .connected-info-text { font-size: 13px; color: var(--text-primary); }
    .connected-info-sub { font-size: 11px; color: var(--text-secondary); }
    .sync-log { display: flex; flex-direction: column; gap: 8px; }
    .sync-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .sync-item i { font-size: 11px; }
    .sync-item .sync-time { margin-left: auto; color: var(--text-muted); }
    .data-types { display: flex; flex-direction: column; gap: 6px; }
    .data-type-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .data-type-label { color: var(--text-secondary); }
    .data-type-count { font-weight: 600; color: var(--text-primary); }

    /* ─── Overlay ──────────────────────────────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.visible { opacity: 1; pointer-events: all; }

    /* ─── Toast ────────────────────────────────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }
    .toast {
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.2s ease;
      max-width: 320px;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast-success { background: var(--success); color: white; }
    .toast-error { background: var(--error); color: white; }
    .toast-info { background: var(--accent); color: white; }

    /* ─── Coming Soon overlay on card ───────────────────────────────────────────────── */
    .coming-soon-overlay {
      position: absolute;
      inset: 0;
      background: rgba(var(--bg-secondary-rgb, 255,255,255), 0.85);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      backdrop-filter: blur(2px);
    }
    .coming-soon-icon i { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--warning-light); color: var(--warning); font-size: 14px; }
    .coming-soon-text { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>
<body>
<div class="app-shell">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main -->
  <div class="main-content">
    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <span class="page-title">Integrations Hub</span>
      </div>
      <div class="top-bar-right">
        <div class="search-bar">
          <i class="ph ph-magnifying-glass"></i>
          <input type="text" id="searchInput" placeholder="Search integrations..." aria-label="Search integrations">
        </div>
        <button class="btn btn-secondary btn-sm" id="syncAllBtn">
          <i class="ph ph-arrows-clockwise"></i> Sync All
        </button>
        <button class="btn btn-secondary btn-icon" id="themeBtn" title="Toggle theme" aria-label="Toggle dark mode">
          <i class="ph ph-moon"></i>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="content-area">
      <!-- Stats -->
      <div class="stats-bar" id="statsBar"></div>

      <!-- Filter tabs -->
      <div class="filter-row" id="filterRow"></div>

      <!-- Grid -->
      <div class="integrations-grid" id="integrationsGrid"></div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="overlay" id="overlay" role="presentation"></div>
<aside class="detail-panel" id="detailPanel" aria-label="Integration details" aria-hidden="true"></aside>

<!-- Toast container -->
<div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

// ============================================================
// STATE
// ============================================================
let activeFilter = 'all';
let searchQuery = '';
let selectedIntegration = null;
let connectedIntegrations = new Set(
  INTEGRATIONS.filter(i => i.status === 'connected').map(i => i.id)
);

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, type = 'info') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="ph ph-${type === 'success' ? 'check-circle' : type === 'error' ? 'x-circle' : 'info'}"></i> ${msg}`;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function formatSyncTime(t) {
  if (!t) return 'Never';
  return t;
}

// ============================================================
// SIDEBAR
// ============================================================

  const nav = document.getElementById('sidebar');
  const navItems = [

// ============================================================
// STATS
// ============================================================
function renderStats() {
  const connected = INTEGRATIONS.filter(i => i.status === 'connected').length;
  const errored = INTEGRATIONS.filter(i => i.status === 'error').length;
  const available = INTEGRATIONS.filter(i => i.status === 'disconnected').length;
  const total = INTEGRATIONS.length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${connected}</div>
      <div class="stat-label">Connected</div>
      <div class="stat-sub">${connected} active syncing</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${available}</div>
      <div class="stat-label">Available to Connect</div>
      <div class="stat-sub">${total} total integrations</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${errored > 0 ? `<span style="color:var(--error)">${errored}</span>` : '0'}</div>
      <div class="stat-label">Needs Attention</div>
      ${errored > 0 ? `<div class="stat-sub" style="color:var(--error)">${errored} require re-auth</div>` : '<div class="stat-sub">All healthy</div>'}
    </div>
    <div class="stat-card">
      <div class="stat-value">67</div>
      <div class="stat-label">Total Integrations</div>
      <div class="stat-sub">In roadmap</div>

}

// ============================================================
// FILTERS
// ============================================================
const CATEGORIES = [
  { key: 'all', label: 'All' },
  { key: 'productivity', label: 'Productivity' },
  { key: 'communication', label: 'Communication' },
  { key: 'health', label: 'Health & Fitness' },
  { key: 'finance', label: 'Finance' },
  { key: 'social', label: 'Social' },
  { key: 'learning', label: 'Learning' },
  { key: 'connected', label: '✓ Connected', special: true },
];

function renderFilters() {
  document.getElementById('filterRow').innerHTML = CATEGORIES.map(c =>
    `<button class="filter-tab${activeFilter === c.key ? ' active' : ''}" data-filter="${c.key}">${c.label}</button>`
  ).join('');

  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      renderFilters();
      renderGrid();
    });
  });
}

// ============================================================
// GRID
// ============================================================
function getFilteredIntegrations() {
  let list = INTEGRATIONS;
  if (activeFilter === 'connected') {
    list = list.filter(i => i.status === 'connected' || i.status === 'error');
  } else if (activeFilter !== 'all') {
    list = list.filter(i => i.cat === activeFilter);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(i =>
      i.name.toLowerCase().includes(q) ||
      i.desc.toLowerCase().includes(q) ||
      (i.tags || []).some(t => t.includes(q))
    );
  }
  return list;
}

function renderCard(integration) {
  const { id, name, icon, color, bg, desc, tags, powers, status, lastSync, account, errorMsg } = integration;
  const isConnected = status === 'connected';
  const isError = status === 'error';
  const isComingSoon = status === 'coming-soon';

  const badgeClass = isConnected ? 'badge-connected' : isError ? 'badge-error' : isComingSoon ? 'badge-coming-soon' : 'badge-disconnected';
  const badgeText = isConnected ? 'Connected' : isError ? 'Error' : isComingSoon ? 'Coming Soon' : 'Not Connected';

  const actionButtons = isConnected
    ? `<button class="btn btn-secondary btn-sm" data-action="sync" data-id="${id}"><i class="ph ph-arrows-clockwise"></i> Sync</button>
       <button class="btn btn-secondary btn-sm" data-action="disconnect" data-id="${id}"><i class="ph ph-plugs"></i></button>`
    : isError
    ? `<button class="btn btn-primary btn-sm" data-action="reauth" data-id="${id}"><i class="ph ph-key"></i> Re-authorize</button>`
    : isComingSoon
    ? `<button class="btn btn-secondary btn-sm" disabled>Notify Me</button>`
    : `<button class="btn btn-primary btn-sm" data-action="connect" data-id="${id}"><i class="ph ph-plug"></i> Connect</button>`;

  return `
    <div class="integration-card${isConnected ? ' connected' : ''}" data-id="${id}" role="button" tabindex="0" aria-label="${name} integration">
      <div class="card-header">
        <div class="service-icon" style="background:${bg};color:${color};">${icon}</div>
        <span class="connection-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="power-flow">
        <div class="pf-icon" style="background:${bg};"></div>
        <div>
          <div class="pf-label">${name}</div>
          ${powers ? `<div class="powers-label">Powers: ${powers}</div>` : ''}
        </div>
      </div>
      <div class="service-name">${name}</div>
      <div class="service-desc">${desc}</div>
      <div class="service-tags">${(tags || []).map(t => `<span class="service-tag">${t}</span>`).join('')}</div>
      ${isConnected && lastSync ? `<div class="last-sync"><i class="ph ph-clock"></i> Last sync: ${lastSync}</div>` : ''}
      ${isError && errorMsg ? `<div class="last-sync" style="color:var(--error)"><i class="ph ph-warning"></i> ${errorMsg}</div>` : ''}
      <div class="card-actions">${actionButtons}</div>
      ${isComingSoon ? '<div class="coming-soon-overlay"><div class="coming-soon-icon"><i class="ph ph-clock"></i></div><div class="coming-soon-text">Coming Soon</div></div>' : ''}
    </div>
  `;
}

function renderGrid() {
  const filtered = getFilteredIntegrations();
  const grid = document.getElementById('integrationsGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);"><i class="ph ph-magnifying-glass" style="font-size:32px;display:block;margin-bottom:8px;"></i>No integrations found</div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');

  // Card click → detail panel
  grid.querySelectorAll('.integration-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('[data-action]')) return;
      openDetailPanel(card.dataset.id);
    });
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!e.target.closest('[data-action]')) openDetailPanel(card.dataset.id);
      }
    });
  });

  // Action buttons
  grid.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      handleAction(btn.dataset.action, btn.dataset.id);
    });
  });
}

// ============================================================
// ACTIONS
// ============================================================
function handleAction(action, id) {
  const integration = INTEGRATIONS.find(i => i.id === id);
  if (!action || !integration) return;

  if (action === 'connect' || action === 'reauth') {
    showToast(`Connecting to ${integration.name}...`, 'info');
    setTimeout(() => {
      integration.status = 'connected';
      integration.lastSync = 'Just now';
      integration.account = 'demo@zensensei.com';
      connectedIntegrations.add(id);
      renderStats();
      renderGrid();
      showToast(`${integration.name} connected successfully!`, 'success');
    }, 1200);
  } else if (action === 'disconnect') {
    integration.status = 'disconnected';
    delete integration.lastSync;
    delete integration.account;
    connectedIntegrations.delete(id);
    closeDetailPanel();
    renderStats();
    renderGrid();
    showToast(`${integration.name} disconnected`, 'info');
  } else if (action === 'sync') {
    showToast(`Syncing ${integration.name}...`, 'info');
    setTimeout(() => {
      integration.lastSync = 'Just now';
      renderGrid();
      showToast(`${integration.name} synced successfully`, 'success');
    }, 900);
  }
}

// ============================================================
// DETAIL PANEL
// ============================================================
function openDetailPanel(id) {
  const integration = INTEGRATIONS.find(i => i.id === id);
  if (!integration) return;
  selectedIntegration = integration;

  const { name, icon, color, bg, desc, status, lastSync, account, syncedItems, scopes, tags } = integration;
  const isConnected = status === 'connected';
  const isError = status === 'error';

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-header-left">
        <div class="panel-icon" style="background:${bg};color:${color};">${icon}</div>
        <div>
          <div class="panel-title">${name}</div>
          <div class="panel-subtitle">${desc.substring(0, 50)}...</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-icon" id="panelClose" aria-label="Close panel"><i class="ph ph-x"></i></button>
    </div>
    <div class="panel-body">
      ${isConnected ? `
        <div class="connected-info">
          <i class="ph ph-check-circle" style="font-size:18px;"></i>
          <div>
            <div class="connected-info-text">Connected as ${account || 'your account'}</div>
            <div class="connected-info-sub">Last sync: ${formatSyncTime(lastSync)}</div>
          </div>
        </div>
      ` : isError ? `
        <div class="connected-info" style="background:var(--error-light);border-color:var(--error);">
          <i class="ph ph-warning" style="font-size:18px;color:var(--error);"></i>
          <div>
            <div class="connected-info-text">Authorization expired</div>
            <div class="connected-info-sub">Please re-authorize to continue syncing</div>
          </div>
        </div>
      ` : ''}

      ${isConnected && syncedItems ? `
        <div class="panel-section">
          <div class="panel-section-title">Synced Data</div>
          <div class="data-types">
            ${Object.entries(syncedItems).map(([k, v]) => `
              <div class="data-type-row">
                <span class="data-type-label">${k}</span>
                <span class="data-type-count">${v.toLocaleString()}</span>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}

      <div class="panel-section">
        <div class="panel-section-title">Permissions Required</div>
        <div class="scope-list">
          ${(scopes || []).map(s => `<div class="scope-item"><i class="ph ph-check"></i> ${s}</div>`).join('')}
        </div>
        <div class="permission-note" style="margin-top:10px;">
          ZenSensei requests read-only access. We never write, post, or modify your data in connected services.
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-section-title">Graph Powers</div>
        <div class="service-tags">
          ${(tags || []).map(t => `<span class="service-tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="panel-footer">
      ${isConnected
        ? `<button class="btn btn-secondary" data-action="sync" data-id="${integration.id}"><i class="ph ph-arrows-clockwise"></i> Sync Now</button>
           <button class="btn btn-secondary" data-action="disconnect" data-id="${integration.id}" style="color:var(--error);"><i class="ph ph-plugs"></i> Disconnect</button>`
        : isError
        ? `<button class="btn btn-primary" data-action="reauth" data-id="${integration.id}"><i class="ph ph-key"></i> Re-authorize</button>`
        : `<button class="btn btn-primary" data-action="connect" data-id="${integration.id}"><i class="ph ph-plug"></i> Connect ${name}</button>`
      }
    </div>
  `;

  panel.setAttribute('aria-hidden', 'false');
  panel.classList.add('open');
  document.getElementById('overlay').classList.add('visible');

  document.getElementById('panelClose').addEventListener('click', closeDetailPanel);
  panel.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      handleAction(btn.dataset.action, btn.dataset.id);
      closeDetailPanel();
    });
  });
}

function closeDetailPanel() {
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('open');
  panel.setAttribute('aria-hidden', 'true');
  document.getElementById('overlay').classList.remove('visible');
  selectedIntegration = null;
}

// ============================================================
// SYNC ALL
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('syncAllBtn').addEventListener('click', () => {
    const connected = INTEGRATIONS.filter(i => i.status === 'connected');
    if (!connected.length) { showToast('No connected integrations to sync', 'info'); return; }
    showToast(`Syncing ${connected.length} integrations...`, 'info');
    setTimeout(() => {
      connected.forEach(i => i.lastSync = 'Just now');
      renderGrid();
      showToast('All integrations synced successfully', 'success');
    }, 1500);
  });

  document.getElementById('overlay').addEventListener('click', closeDetailPanel);

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderGrid();
  });

  // Theme toggle
  const themeBtn = document.getElementById('themeBtn');
  const saved = localStorage.getItem('zensensei-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  themeBtn.querySelector('i').className = saved === 'dark' ? 'ph ph-sun' : 'ph ph-moon';

  themeBtn.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('zensensei-theme', newTheme);
    themeBtn.querySelector('i').className = newTheme === 'dark' ? 'ph ph-sun' : 'ph ph-moon';
  });
});

// ============================================================
// INIT
// ============================================================
function init() {
  renderSidebar();
  renderIntegrations();
}

function renderIntegrations() {
  renderStats();
  renderFilters();
  renderGrid();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(init, 100);
  });
} else {
  setTimeout(init, 100);
}
</script>
