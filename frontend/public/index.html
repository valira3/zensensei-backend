<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenSensei</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  -webkit-text-size-adjust: none;
  text-size-adjust: none;
}

/* ============================================
   DESIGN TOKENS
   ============================================ */
:root {
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;

  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-2xl: 1.25rem;
  --radius-full: 9999px;

  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --transition-fast: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}

/* LIGHT MODE */
:root, [data-theme="light"] {
  --color-bg:           #FFFFFF;
  --color-surface:      #F8FAFC;
  --color-surface-2:    #F1F5F9;
  --color-surface-offset: #E2E8F0;
  --color-divider:      #E2E8F0;
  --color-border:       #E2E8F0;

  --color-text:         #0F172A;
  --color-text-muted:   #6B7280;
  --color-text-faint:   #9CA3AF;
  --color-text-inverse: #FFFFFF;

  --color-primary:       #3B82F6;
  --color-primary-hover: #2563EB;
  --color-primary-light: #DBEAFE;
  --color-primary-bg:    #EFF6FF;

  --color-success:       #10B981;
  --color-success-light: #D1FAE5;
  --color-success-bg:    #ECFDF5;

  --color-warning:       #F59E0B;
  --color-warning-light: #FEF3C7;
  --color-warning-bg:    #FFFBEB;

  --color-purple:        #8B5CF6;
  --color-purple-light:  #EDE9FE;
  --color-purple-bg:     #F5F3FF;

  --color-celebration:   #FBBF24;
  --color-error:         #EF4444;
  --color-error-light:   #FEE2E2;

  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 4px 12px rgba(15,23,42,0.07);
  --shadow-lg: 0 12px 32px rgba(15,23,42,0.1);

  --phone-outer-bg: linear-gradient(135deg, #3B82F6 0%, #1E40AF 50%, #3B82F6 100%);
  --phone-shell: #1a1a1a;
}

/* DARK MODE */
[data-theme="dark"] {
  --color-bg:           #0F172A;
  --color-surface:      #1E293B;
  --color-surface-2:    #334155;
  --color-surface-offset: #475569;
  --color-divider:      rgba(148,163,184,0.12);
  --color-border:       rgba(148,163,184,0.12);

  --color-text:         #F1F5F9;
  --color-text-muted:   #94A3B8;
  --color-text-faint:   #64748B;
  --color-text-inverse: #0F172A;

  --color-primary:       #60A5FA;
  --color-primary-hover: #3B82F6;
  --color-primary-light: rgba(59,130,246,0.18);
  --color-primary-bg:    rgba(59,130,246,0.08);

  --color-success:       #34D399;
  --color-success-light: rgba(16,185,129,0.18);
  --color-success-bg:    rgba(16,185,129,0.08);

  --color-warning:       #FBBF24;
  --color-warning-light: rgba(245,158,11,0.18);
  --color-warning-bg:    rgba(245,158,11,0.08);

  --color-purple:        #A78BFA;
  --color-purple-light:  rgba(139,92,246,0.18);
  --color-purple-bg:     rgba(139,92,246,0.08);

  --color-celebration:   #FBBF24;
  --color-error:         #F87171;
  --color-error-light:   rgba(239,68,68,0.18);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.35);

  --phone-outer-bg: linear-gradient(135deg, #1E293B 0%, #0F172A 50%, #1E293B 100%);
  --phone-shell: #0a0a0a;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ============================================
   OUTER PAGE (behind phone)
   ============================================ */
body {
  font-family: var(--font-body);
  margin: 0;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--phone-outer-bg);
  overflow: hidden;
  transition: background 0.4s var(--ease);
}
