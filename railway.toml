# Railway configuration for ZenSensei Backend Gateway
# This is the root-level config used when deploying from the repo root.
# Individual service configs live in railway-configs/<service>.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn gateway.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]

[environments.production.variables]
ENVIRONMENT = "production"
LOG_LEVEL = "INFO"
