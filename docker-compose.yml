version: "3.9"

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5.14-community
    environment:
      NEO4J_AUTH: neo4j/localdev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:alpine
    command: gcloud beta emulators firestore start --host-port=0.0.0.0:8080
    ports:
      - "8080:8080"
    environment:
      CLOUDSDK_CORE_PROJECT: zensensei-platform

  # ─── Application Services ───────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: services/user_service/Dockerfile
    environment:
      SERVICE_PORT: "8001"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: localdev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FIRESTORE_EMULATOR_HOST: firestore-emulator:8080
      FIREBASE_PROJECT_ID: zensensei-platform
      SECRET_KEY: local-dev-secret-key
      ENVIRONMENT: development
    ports:
      - "8001:8001"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  graph-query-service:
    build:
      context: .
      dockerfile: services/graph_query_service/Dockerfile
    environment:
      SERVICE_PORT: "8002"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: localdev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SECRET_KEY: local-dev-secret-key
      ENVIRONMENT: development
    ports:
      - "8002:8002"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-reasoning-service:
    build:
      context: .
      dockerfile: services/ai_reasoning_service/Dockerfile
    environment:
      SERVICE_PORT: "8003"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: localdev
      REDIS_HOST: redis
      SECRET_KEY: local-dev-secret-key
      ENVIRONMENT: development
      GEMINI_API_KEY: ""
    ports:
      - "8003:8003"
    depends_on:
      - redis

  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      PORT: "4000"
      SECRET_KEY: local-dev-secret-key
      USER_SERVICE_URL: http://user-service:8001
      GRAPH_QUERY_SERVICE_URL: http://graph-query-service:8002
      AI_REASONING_SERVICE_URL: http://ai-reasoning-service:8003
      ENVIRONMENT: development
    ports:
      - "4000:4000"
    depends_on:
      - user-service
      - graph-query-service
      - ai-reasoning-service

volumes:
  neo4j_data:
  redis_data:
