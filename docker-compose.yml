version: "3.9"

services:
  neo4j:
    image: neo4j:5.14-enterprise
    container_name: zensensei-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/localdev
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - zensensei-net

  redis:
    image: redis:7-alpine
    container_name: zensensei-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zensensei-net

  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: zensensei-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      PORT: 4000
    restart: unless-stopped
    networks:
      - zensensei-net

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  zensensei-net:
    driver: bridge
