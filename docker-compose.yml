version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5.14-enterprise
    container_name: zensensei-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-localdev}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - zensensei-net

  redis:
    image: redis:7-alpine
    container_name: zensensei-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-localdev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-localdev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zensensei-net

  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: zensensei-firestore
    ports:
      - "8080:8080"
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8080
      --project=zensensei-platform
    environment:
      FIRESTORE_EMULATOR_HOST: "0.0.0.0:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - zensensei-net

  # ─── Frontend ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: zensensei-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      PORT: 3000
      API_GATEWAY_URL: http://api-gateway:4000
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - zensensei-net

  # ─── Microservices ─────────────────────────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: services/user_service/Dockerfile
    container_name: zensensei-user-service
    ports:
      - "${USER_SERVICE_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      PORT: 8001
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
      FIRESTORE_EMULATOR_HOST: firestore-emulator:8080
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      firestore-emulator:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zensensei-net

  graph-query-service:
    build:
      context: .
      dockerfile: services/graph_query_service/Dockerfile
    container_name: zensensei-graph-service
    ports:
      - "${GRAPH_QUERY_SERVICE_PORT:-8002}:8002"
    env_file:
      - .env
    environment:
      PORT: 8002
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zensensei-net

  ai-reasoning-service:
    build:
      context: .
      dockerfile: services/ai_reasoning_service/Dockerfile
    container_name: zensensei-ai-service
    ports:
      - "${AI_REASONING_SERVICE_PORT:-8003}:8003"
    env_file:
      - .env
    environment:
      PORT: 8003
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zensensei-net

  integration-service:
    build:
      context: .
      dockerfile: services/integration_service/Dockerfile
    container_name: zensensei-integration-service
    ports:
      - "${INTEGRATION_SERVICE_PORT:-8004}:8004"
    env_file:
      - .env
    environment:
      PORT: 8004
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zensensei-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    container_name: zensensei-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8005}:8005"
    env_file:
      - .env
    environment:
      PORT: 8005
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zensensei-net

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics_service/Dockerfile
    container_name: zensensei-analytics-service
    ports:
      - "${ANALYTICS_SERVICE_PORT:-8006}:8006"
    env_file:
      - .env
    environment:
      PORT: 8006
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zensensei-net

  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: zensensei-api-gateway
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      PORT: 4000
      USER_SERVICE_URL: http://user-service:8001
      GRAPH_QUERY_SERVICE_URL: http://graph-query-service:8002
      AI_REASONING_SERVICE_URL: http://ai-reasoning-service:8003
      INTEGRATION_SERVICE_URL: http://integration-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      ANALYTICS_SERVICE_URL: http://analytics-service:8006
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
    depends_on:
      - user-service
      - graph-query-service
      - ai-reasoning-service
      - integration-service
      - notification-service
      - analytics-service
    restart: unless-stopped
    networks:
      - zensensei-net

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  zensensei-net:
    driver: bridge
