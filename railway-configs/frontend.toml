# Railway service config — Frontend (ZenSensei Web App)
# Root Directory: . (repo root)
# Dockerfile:     frontend/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "frontend/Dockerfile"

[deploy]
startCommand = "nginx -g 'daemon off;'"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]

[environments.production.variables]
NODE_ENV = "production"
NEXT_PUBLIC_API_URL = "${{gateway.RAILWAY_PUBLIC_DOMAIN}}"
NEXT_PUBLIC_WS_URL = "${{gateway.RAILWAY_PUBLIC_DOMAIN}}"
NEXT_PUBLIC_FIREBASE_API_KEY = "${{shared.FIREBASE_API_KEY}}"
NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN = "${{shared.FIREBASE_AUTH_DOMAIN}}"
NEXT_PUBLIC_FIREBASE_PROJECT_ID = "${{shared.GCP_PROJECT_ID}}"
