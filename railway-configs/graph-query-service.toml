# Railway service config - Graph Query Service
# Root Directory: . (repo root)
# Dockerfile: services/graph_query_service/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/graph_query_service/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables required:
# PORT, ENVIRONMENT, SECRET_KEY, NEO4J_URI, NEO4J_USER, NEO4J_PASSWORD
# NEO4J_DATABASE, NEO4J_MAX_POOL_SIZE, REDIS_URL, CACHE_TTL_SECONDS
# WEB_CONCURRENCY
