# Railway service config - Integration Service
# Root Directory: . (repo root)
# Dockerfile: services/integration_service/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/integration_service/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables required:
# PORT, ENVIRONMENT, SECRET_KEY, OAUTH_ENCRYPTION_KEY
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
# NOTION_CLIENT_ID, NOTION_CLIENT_SECRET, REDIRECT_BASE_URL
# FIRESTORE_PROJECT_ID, REDIS_URL, WORKERS
